[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "useblysh"
version = "1.0.1"
authors = [
  { name="Rishabh Mishra", email="rishabhmishra.81@gmail.com" },
]
description = "High-performance visual hashing for seamless image loading. Encode images into tiny strings and decode into beautiful, fast-loading blurs"
readme = "README.md"
requires-python = ">=3.7"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "numpy",
    "pillow",
]

[project.urls]
"Homepage" = "https://github.com/R1SH4BH81/Blysh"
"Bug Tracker" = "https://github.com/R1SH4BH81/Blysh/issues"
