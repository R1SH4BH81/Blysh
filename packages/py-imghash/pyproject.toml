[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "imghash"
version = "1.0.0"
authors = [
  { name="Your Name", email="your@email.com" },
]
description = "A simple image hashing library (BlurHash-like) in Python."
readme = "README.md"
requires-python = ">=3.7"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "numpy",
    "pillow",
]

[project.urls]
"Homepage" = "https://github.com/your/repo"
"Bug Tracker" = "https://github.com/your/repo/issues"
