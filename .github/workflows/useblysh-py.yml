name: useblysh-py CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'packages/py-useblysh/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/py-useblysh/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/py-useblysh

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install .

      - name: Run tests
        run: python -m unittest discover tests

      - name: Build package
        run: python -m build

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write # Required for Trusted Publishing on PyPI

    defaults:
      run:
        working-directory: packages/py-useblysh

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Pointing to the specific dist folder inside the package directory
          packages-dir: packages/py-useblysh/dist/