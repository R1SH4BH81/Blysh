name: Python CI

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/py-imghash/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/py-imghash/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/py-imghash

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Build package
        run: |
          pip install build
          python -m build
