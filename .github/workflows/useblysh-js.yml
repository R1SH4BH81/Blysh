name: useblysh-js CI

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/js-useblysh/**'
  push:
    tags: [ 'v*' ] # No paths filter here! This ensures tags always trigger.
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/js-useblysh/**'

# Prevents multiple deployments from running at once
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js-useblysh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/js-useblysh/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Trigger only on version tags
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      id-token: write # Required for --provenance

    defaults:
      run:
        working-directory: packages/js-useblysh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/js-useblysh/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}