name: useblysh-js CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'packages/js-useblysh/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/js-useblysh/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/js-useblysh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/js-useblysh/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: packages/js-useblysh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
