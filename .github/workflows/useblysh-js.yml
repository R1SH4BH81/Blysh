name: useblysh-js CI

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/js-useblysh/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/js-useblysh/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/js-useblysh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/js-useblysh/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
