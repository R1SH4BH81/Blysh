name: Sync Repowiki to GitHub Wiki

on:
  push:
    paths:
      - '.qoder/repowiki/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Transformation Script
        run: python scripts/sync-wiki.py

      - name: Push to Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki_output
          commit-message: "docs: update repowiki content"
          token: ${{ secrets.GITHUB_TOKEN }}
